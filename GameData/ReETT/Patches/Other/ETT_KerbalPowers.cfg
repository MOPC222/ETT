// 
// KerbalPowersNaval
// 
@PART[smallBuoyancy]:NEEDS[KerbalPowers/Naval]
{
		@TechRequired = Buoyancy
}
@PART[herringPropeller|minnowPropeller|mediumBuoyancy]:NEEDS[KerbalPowers/Naval]
{
		@TechRequired = hydrodynamics
}
@PART[largeBuoyancy|sturgeonPropeller]:NEEDS[KerbalPowers/Naval]
{
		@TechRequired = advHydrodynamics
}
// 
// KerbalPowersElectrics
// 
@PART[kpdTurbine]:NEEDS[KerbalPowers/Electrics]
{
		@TechRequired = improvedNuclearPower
}
@PART[kpdReactor]:NEEDS[KerbalPowers/Electrics]
{
		@TechRequired = advNuclearPower
}