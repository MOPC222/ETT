//
// Engine Ignitor upgrades patch

//
// Toolbox
@PARTUPGRADE[Toolbox]:NEEDS[EngineIgnitor]:FOR[zzzReETT]
{
    @techRequired = advLogistics
}

//
// Ignition system upgrades moved around for ETT
// Based on original EI configs made by forum user @mrZonke
@PARTUPGRADE[ignitionUpgrade_1]:NEEDS[EngineIgnitor]:FOR[zzzReETT]
{
    @techRequired = fuelSystems
    @entryCost = 15000
}
@PARTUPGRADE[ignitionUpgrade_2]:NEEDS[EngineIgnitor]:FOR[zzzReETT]
{
    @techRequired = precisionPropulsion
    @entryCost = 26000
}
@PARTUPGRADE[ignitionUpgrade_3]:NEEDS[EngineIgnitor]:FOR[zzzReETT]
{
    @techRequired = heavyRCS
    @entryCost = 32000
}
@PARTUPGRADE[ignitionUpgrade_4]:NEEDS[EngineIgnitor]:FOR[zzzReETT]
{
	@techRequired = MultiFunctionLFO
	@entryCost = 48000
}
@PARTUPGRADE[ignitionUpgrade_8]:NEEDS[EngineIgnitor]:FOR[zzzReETT]
{
    @techRequired = experimentalElectricalSystems
    @entryCost = 58000
}

//
// Engines Ignition Upgrades
@PART[*]:NEEDS[EngineIgnitor]:FOR[zzzReETT]
{
    @MODULE[ModuleEngineIgnitor]
    {
        @UPGRADES
        {
            @UPGRADE:HAS[name__[ignitionUpgrade_1]]
            {
                @techRequired__ = fuelSystems
            }
        }
    }
}
