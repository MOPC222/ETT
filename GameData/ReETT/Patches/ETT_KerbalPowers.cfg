// 
// KerbalPowersNaval
// 01/03/26
//
@PART[smallBuoyancy|minnowPropeller]:NEEDS[KerbalPowers/Naval]:FOR[zzzReETT]
{
		@TechRequired = buoyancy
}
@PART[herringPropeller|mediumBuoyancy]:NEEDS[KerbalPowers/Naval]:FOR[zzzReETT]
{
		@TechRequired = hydrodynamics
}
@PART[largeBuoyancy|sturgeonPropeller]:NEEDS[KerbalPowers/Naval]:FOR[zzzReETT]
{
		@TechRequired = advHydrodynamics
}
// 
// KerbalPowersElectrics
// 
@PART[kpdTurbine]:NEEDS[KerbalPowers/Electrics]:FOR[zzzReETT]
{
		@TechRequired = serviceModules
}
@PART[kpdReactor]:NEEDS[KerbalPowers/Electrics]:FOR[zzzReETT]
{
		@TechRequired = advNuclearPower
}