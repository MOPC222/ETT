{
		@TechRequired = highPerformanceHeatManagement
}
// Liquid Film Radiators
@PART[strl-rad-lfr*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = exoticHeatManagement
}
// Preheaters
@PART[strl-preh*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = specializedHeatManagement
