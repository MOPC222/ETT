// Steam Turbines
@PART[strl-tectrb*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = advElectrics
}
@PART[strl-tectrb-375|strl-tectrb-500]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = largeElectrics
}
// Betavoltaics
@PART[strl-rctrbv*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = improvedNuclearPower
}
@PART[strl-rctrbv01]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = nuclearPower
}
// KLUSTR
@PART[strl-rctrkrusty]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = advNuclearPower
}
// Subcritical Multiplier
@PART[strl-rctrscm]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = highEnergyNuclearPower
}
// Batteries
@PART[strl-batt*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = experimentalEnergyStorage
}
@PART[strl-batt-lug]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = highTechElectrics
}
@PART[strl-batt-mk2|strl-batt-250|strl-batt-375|strl-batt-500]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = exoticBatteries
}
//
// Sterling Systems Solar
//
// Wrapper Solar Panels
@PART[strl-pv-wrapxs-lin|strl-pv-wrapxs-062]:NEEDS[SterlingSystems]:AFTER[zzzReETT]
{
		@TechRequired = solarTech
}
@PART[strl-pv-wrapxs-125|strl-pv-wrapxs-187|strl-pv-wrap-062|strl-pv-wrap-125|strl-pv-wrap-187]:NEEDS[SterlingSystems]:AFTER[zzzReETT]
{
		@TechRequired = improvedSolarTech
}
@PART[strl-pv-wrap*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = advSolarTech
}
//
// Sterling Systems Thermals
//
// Wrapper radiators Ammonia
@PART[strl-rad-wrapw*|strl-rad-rollw*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = advHeatManagement
}
// Wrapper radiators Titanium
@PART[strl-rad-wrapg*|strl-rad-rollg*]:NEEDS[SterlingSystems]:FOR[zzzReETT]
{
		@TechRequired = specializedHeatManagement
