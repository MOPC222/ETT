@TechTree:NEEDS[Taerobee]:LAST[zzzETT]
{
	@RDNode:HAS[#id[start]]
	{
		@Unlocks,0
		{
			part = tbee-taerobee-fin-large
			part = tbee-taerobee-fin-small
			part = tbee-taerobee-science
			part = tbee-taerobee-tinytim
		}
	}
	@RDNode:HAS[#id[stability]]
	{
		@Unlocks,0
		{
			part = tbee-bumper-fin
		}
	}
	@RDNode:HAS[#id[survivability]]
	{
		@Unlocks,0
		{
			part = tbee-taerobee-parachute
		}
	}
	@RDNode:HAS[#id[electrics]]
	{
		@Unlocks,0
		{
			part = tbee-taerobee-control
			part = tbee-bumper-control
		}
	}
	@RDNode:HAS[#id[modelRockets]]
	{
		@Unlocks,0
		{
			part = tbee-taerobee-aerobee
			part = tbee-taerobee-adapter-short
			part = tbee-taerobee-adapter-tall
			part = tbee-taerobee-decoupler
			part = tbee-taerobee-despin
			part = tbee-taerobee-tank-sustainer-3
			part = tbee-taerobee-nosecone
		}
	}
	@RDNode:HAS[#id[soundingRockets]]
	{
		@Unlocks,0
		{
			part = tbee-bumper-nose
			part = tbee-bumper-body
			part = tbee-bumper-engine
			part = tbee-bumper-engine-slimJim
			part = tbee-bumper-engine-unclad
		}
	}
	@RDNode:HAS[#id[fuelSystems]]
	{
		@Unlocks,0
		{
			part = tbee-x1-engine
			part = tbee-x1-body
			part = tbee-x1-tail
		}
	}
	@RDNode:HAS[#id[supersonicFlight]]
	{
		@Unlocks,0
		{
			part = tbee-x1-crew
		}
	}
}