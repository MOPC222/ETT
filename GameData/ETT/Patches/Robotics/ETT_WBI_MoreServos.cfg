//
// MoreServos
//
@TechTree:NEEDS[WildBlueIndustries/MoreServos]:LAST[zzzETT]
{
	@RDNode:HAS[#id[coupling]]
	{
		@Unlocks,0
		{
			part = wbiMicroPort2
			part = wbiEndEffector2
		}
	}
	@RDNode:HAS[#id[advSolarTech]]
	{
		@Unlocks,0
		{
			part = wbiSolarBattery
		}
	}
	@RDNode:HAS[#id[automation]]
	{
		@Unlocks,0
		{
			part = wbiKi200
		}
	}
	@RDNode:HAS[#id[actuators]]
	{
		@Unlocks,0
		{
			part = wbiAxialServo
			part = wbiSideBySideServo2
			part = wbiRightAngleServo2
		}
	}
	@RDNode:HAS[#id[experimentalActuators]]
	{
		@Unlocks,0
		{
			part = wbiHingeJoint
			part = wbiElbowHinge
			part = wbiExtensionBoomMedium
			part = wbiExtensionBoomLarge
		}
	}
}