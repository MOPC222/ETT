//
// KerbalPowersNaval
//
@TechTree:NEEDS[B9_Aerospace]:LAST[zzzETT]
{
	@RDNode:HAS[#id[Buoyancy]]
	{
		@Unlocks,0
		{
			part = smallBuoyancy
		}
	}
	@RDNode:HAS[#id[hydrodynamics]]
	{
		@Unlocks,0
		{
			part = herringPropeller
			part = minnowPropeller
			part = mediumBuoyancy
		}
	}
	@RDNode:HAS[#id[advHydrodynamics]]
	{
		@Unlocks,0
		{
			part = largeBuoyancy
			part = sturgeonPropeller
		}
	}
}