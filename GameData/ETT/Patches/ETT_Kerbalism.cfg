//
// Moves around some parts for Kerbalism

@PART[kerbalism-antenna]:NEEDS[Kerbalism|KerbalismDefault|KerbalismSimplex]:LAST[zzzETT]
{
		@TechRequired = electrics
}
@PART[longAntenna]:NEEDS[Kerbalism|KerbalismDefault|KerbalismSimplex]:LAST[zzzETT]
{
		@TechRequired = engineering101
}

@TechTree:NEEDS[Kerbalism|KerbalismDefault|KerbalismSimplex]:LAST[zzzETT]
{
	@RDNode:HAS[#id[engineering101]]
	{
		@Unlocks,0
		{
			part = kerbalism-antenna
		}
	}
	@RDNode:HAS[#id[basicScience]]
	{
		@Unlocks,0
		{
			part = kerbalism-geigercounter
		}
	}
	@RDNode:HAS[#id[lifeSupport]]
	{
		@Unlocks,0
		{
			part = kerbalism-container-radial-pressurized-prosemian-small
			part = kerbalism-container-radial-pressurized-prosemian-medium
			part = kerbalism-container-radial-pressurized-prosemian-medium-plus
			part = kerbalism-food-small
			part = kerbalism-lifesupportmodule
			part = kerbalism-oxygen-radial
		}
	}
	@RDNode:HAS[#id[advLifeSupport]]
	{
		@Unlocks,0
		{
			part = kerbalism-activeshield
			part = kerbalism-chemicalplant
			part = kerbalism-container-radial-pressurized-prosemian-big
			part = kerbalism-container-radial-pressurized-prosemian-huge
			part = kerbalism-food-125
			part = kerbalism-greenhouse
		}
	}
	@RDNode:HAS[#id[recyclingTech]]
	{
		@Unlocks,0
		{
			part = kerbalism-food-250
		}
	}
	@RDNode:HAS[#id[longTermHabitation]]
	{
		@Unlocks,0
		{
			part = kerbalism-gravityring
		}
	}
}