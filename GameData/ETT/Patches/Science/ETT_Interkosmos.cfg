//
// Interkosmos
//
@TechTree:NEEDS[Interkosmos]:LAST[zzzETT]
{
	@RDNode:HAS[#id[basicScience]]
	{
		@Unlocks,0
		{
			part = Box_Sensor_GasAnalyzer
			part = Box_Sensor_Hydrometer
		}
	}
	@RDNode:HAS[#id[engineering101]]
	{
		@Unlocks,0
		{
			part = Box_Sensor_Photometer
		}
	}
	@RDNode:HAS[#id[experimentalScience]]
	{
		@Unlocks,0
		{
			part = Box_Sensor_IRSpectrometer
			part = Box_Sensor_Photopolarimeter
		}
	}
	@RDNode:HAS[#id[longTermScienceTech]]
	{
		@Unlocks,0
		{
			part = Box_XL_Crystals_Generator
		}
	}
}