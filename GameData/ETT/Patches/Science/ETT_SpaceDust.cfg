//
// SpaceDust
//
@TechTree:NEEDS[SpaceDust]:LAST[zzzETT]
{
	@RDNode:HAS[#id[advFuelSystems]]
	{
		@Unlocks,0
		{
			part = spacedust-atmosphere-processor-125-1
		}
	}
	@RDNode:HAS[#id[conversionSystems]]
	{
		@Unlocks,0
		{
			part = spacedust-atmosphere-processor-25-1
		}
	}
	@RDNode:HAS[#id[experimentalScience]]
	{
		@Unlocks,0
		{
			part = spacedust-telescope-1-small
		}
	}
	@RDNode:HAS[#id[specializedScienceTech]]
	{
		@Unlocks,0
		{
			part = spacedust-gas-analyzer-1
		}
	}
	@RDNode:HAS[#id[highEnergyScience]]
	{
		@Unlocks,0
		{
			part = spacedust-telescope-1
		}
	}
	@RDNode:HAS[#id[fusionPower]]
	{
		@Unlocks,0
		{
			part = spacedust-spectrometer-1
		}
	}
}