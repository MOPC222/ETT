//
// KerBalloons
//
@TechTree:NEEDS[KerBalloons]:LAST[zzzETT]
{
	@RDNode:HAS[#id[start]]
	{
		@Unlocks,0
		{
			part = universalBalloonHP
		}
	}
	@RDNode:HAS[#id[survivability]]
	{
		@Unlocks,0
		{
			part = KBChute0625
			part = KBChute125
		}
	}
	@RDNode:HAS[#id[advSurvivability]]
	{
		@Unlocks,0
		{
			part = KBChute25
		}
	}
	@RDNode:HAS[#id[enhancedSurvivability]]
	{
		@Unlocks,0
		{
			part = KBChute375
		}
	}
}
//
//
//
@PARTUPGRADE[BalloonSize0]:NEEDS[KerBalloons]:LAST[zzzETT]
{
	@techRequired = start
}
@PARTUPGRADE[BalloonSize1]:NEEDS[KerBalloons]:LAST[zzzETT]
{
	@techRequired = Buoyancy
}
@PARTUPGRADE[BalloonSize2]:NEEDS[KerBalloons]:LAST[zzzETT]
{
	@techRequired = advBuoyancy
}
@PARTUPGRADE[BalloonSize3]:NEEDS[KerBalloons]:LAST[zzzETT]
{
	@techRequired = extremeBuoyancy
}