//
// KerBalloons
//
@PART[universalBalloonHP]:NEEDS[KerBalloons]
{
		@TechRequired = start
}
@PART[KBChute0625|KBChute125]:NEEDS[KerBalloons]
{
		@TechRequired = survivability
}
@PART[KBChute25]:NEEDS[KerBalloons]
{
		@TechRequired = advSurvivability
}
@PART[KBChute375]:NEEDS[KerBalloons]
{
		@TechRequired = enhancedSurvivability
}
