//
// Mk2 Lobes
//
@PART[mk2l-aeronose-01|mk2l-aerotail-01]
{
  @TechRequired = supersonicFlight
}
@PART[mk2l-intake-01]
{
  @TechRequired = advAerodynamics
}
@PART[mk2l-rw|mk2l-rcs]
{
  @TechRequired = specializedControl
}
@PART[mk2l-batt]
{
  @TechRequired = largeElectrics
}
@PART[mk2l-shroud-01|mk2l-mount|mk2l-cargobay|mk2l-tank*]
{
  @TechRequired = highAltitudeFlight
}
@PART[mk2l-engsj]
{
  @TechRequired = highPerformanceFuelSystems
}
@PART[mk2l-engvas]
{
  @TechRequired = aerospikeTech
}
@PART[mk2l-engvtf]
{
  @TechRequired = stovl
}