			part = B9_Aero_Wing_Procedural_TypeA
		}
	}
	@RDNode:HAS[#id[basicControlSurfaces]]
	{
		@Unlocks,0
		{
			part = B9_Aero_Wing_Procedural_TypeB
		}
	}
	@RDNode:HAS[#id[advControlSurfaces]]
	{
		@Unlocks,0
		{
			part = B9_Aero_Wing_Procedural_TypeC
		}
	}
}